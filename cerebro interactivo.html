<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEREBRO INTERACTIVO PRO</title>
<style>
body{margin:0;background:black;overflow:hidden;}
canvas{display:block;}
#ui{
 position:fixed;
 top:10px;left:10px;
 background:rgba(0,0,0,0.5);
 padding:10px;border-radius:10px;
}
button,input{margin:4px;}
</style>
</head>
<body>

<div id="ui">
<button id="micBtn">🎤 MIC</button>
<input type="file" id="fileInput" accept="audio/*">
<button id="recBtn">⏺ REC</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

window.onresize=()=>{
 canvas.width = innerWidth;
 canvas.height = innerHeight;
};

// ================= AUDIO =================
let audioCtx, analyser, dataArray;
let history=[];

function bands(data){
 let bass=0, mid=0, high=0;

 for(let i=0;i<data.length;i++){
  let v=data[i]/255;
  if(i<15) bass+=v*v;
  else if(i<80) mid+=v;
  else high+=v*v;
 }

 return {
  bass:bass/15,
  mid:mid/65,
  high:high/(data.length-80)
 };
}

function detectKick(b){
 history.push(b);
 if(history.length>30) history.shift();
 let avg = history.reduce((a,b)=>a+b,0)/history.length;
 return b > avg*1.4;
}

// ================= INTERACCIÓN =================
let mouse = {x:0,y:0,down:false};
let mode = 2;
let autoTime = 0;

window.onmousemove = e=>{
 mouse.x = e.clientX;
 mouse.y = e.clientY;
};

window.onmousedown = ()=> mouse.down = true;
window.onmouseup = ()=> mouse.down = false;

window.onkeydown = e=>{
 if(e.key==="1") mode=1;
 if(e.key==="2") mode=2;
 if(e.key==="3") mode=3;
};

// ================= RED ORGÁNICA =================
const nodes=[];
const links=[];

const centerX = canvas.width/2;
const centerY = canvas.height/2;

const total = 220;

for(let i=0;i<total;i++){
 let angle = Math.random()*Math.PI*2;
 let radius = Math.pow(Math.random(),0.6)*400;

 nodes.push({
  x:centerX + Math.cos(angle)*radius + (Math.random()*40-20),
  y:centerY + Math.sin(angle)*radius + (Math.random()*40-20),
  energy:0,
  size: Math.random()<0.1 ? 2 : 1
 });
}

for(let i=0;i<nodes.length;i++){
 for(let j=i+1;j<nodes.length;j++){
  let dx=nodes[i].x-nodes[j].x;
  let dy=nodes[i].y-nodes[j].y;
  let d=Math.sqrt(dx*dx+dy*dy);

  if(d<120){
   links.push({
    a:i,
    b:j,
    pulse:0,
    progress:0,
    speed:0.01 + Math.random()*0.03
   });
  }
 }
}

// ================= LOOP =================
function draw(){
 requestAnimationFrame(draw);

 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 if(!dataArray) return;

 analyser.getByteFrequencyData(dataArray);
 let b = bands(dataArray);
 let kick = detectKick(b.bass);

 // AUTO MOVIMIENTO
 autoTime += 0.01;
 if(!mouse.down){
  mouse.x = canvas.width/2 + Math.cos(autoTime)*200;
  mouse.y = canvas.height/2 + Math.sin(autoTime)*150;
 }

 // NODOS
 nodes.forEach(n=>{
  let dx = n.x - mouse.x;
  let dy = n.y - mouse.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < 150){
   let f = (150 - dist)/150;

   if(mode===1) n.energy += f*0.2;
   if(mode===2) n.energy += f*0.6;
   if(mode===3) n.energy += f*1.2;
  }

  if(mouse.down && dist<200){
   n.energy += 1.5;
  }

  n.energy += b.bass*0.08;
  n.energy += b.mid*0.02;

  n.energy *= 0.93;
 });

 // LINKS
 links.forEach(l=>{
  let n1 = nodes[l.a];
  let n2 = nodes[l.b];

  // explosión mouse
  if(mouse.down){
   let dx = n1.x - mouse.x;
   let dy = n1.y - mouse.y;
   let dist = Math.sqrt(dx*dx+dy*dy);

   if(dist<120 && Math.random()<0.3){
    l.pulse=1;
    l.progress=0;
   }
  }

  // kick real
  if(kick && Math.random()<0.2){
   l.pulse=1;
   l.progress=0;
  }

  l.pulse*=0.96;
  l.progress += l.speed + b.mid*0.05;

  if(l.progress>1){
   l.progress=0;
   l.pulse=0;
  }

  let hue = (b.high*500 + l.pulse*200)%360;
  let color = `hsl(${hue},100%,60%)`;

  ctx.strokeStyle=color;
  ctx.lineWidth=0.5 + l.pulse*2;

  ctx.beginPath();
  ctx.moveTo(n1.x,n1.y);
  ctx.lineTo(n2.x,n2.y);
  ctx.stroke();

  // pulso viajando
  if(l.pulse>0.2){
   let px = n1.x + (n2.x-n1.x)*l.progress;
   let py = n1.y + (n2.y-n1.y)*l.progress;

   ctx.globalCompositeOperation="lighter";

   ctx.fillStyle=color;
   ctx.beginPath();
   ctx.arc(px,py,2 + l.pulse*6,0,Math.PI*2);
   ctx.fill();

   ctx.globalCompositeOperation="source-over";
  }
 });

 // NODOS VISUALES
 nodes.forEach(n=>{
  let size = n.size + n.energy*10;
  let hue = (n.energy*400)%360;

  ctx.globalCompositeOperation="lighter";

  ctx.fillStyle=`hsl(${hue},100%,60%)`;
  ctx.beginPath();
  ctx.arc(n.x,n.y,size,0,Math.PI*2);
  ctx.fill();

  ctx.globalCompositeOperation="source-over";
 });

 // FLASH
 if(kick){
  ctx.fillStyle="rgba(255,255,255,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
 }
}

draw();

// ================= AUDIO =================
document.getElementById("fileInput").onchange=e=>{
 const audio=new Audio(URL.createObjectURL(e.target.files[0]));

 audioCtx=new AudioContext();
 analyser=audioCtx.createAnalyser();
 analyser.fftSize=512;

 const src=audioCtx.createMediaElementSource(audio);
 src.connect(analyser);
 analyser.connect(audioCtx.destination);

 dataArray=new Uint8Array(analyser.frequencyBinCount);

 audio.play();
};

document.getElementById("micBtn").onclick=async ()=>{
 audioCtx=new AudioContext();
 analyser=audioCtx.createAnalyser();
 analyser.fftSize=512;

 const stream=await navigator.mediaDevices.getUserMedia({audio:true});
 const src=audioCtx.createMediaStreamSource(stream);

 src.connect(analyser);

 dataArray=new Uint8Array(analyser.frequencyBinCount);
};

// ================= GRABAR =================
let recorder,chunks=[];

document.getElementById("recBtn").onclick=()=>{
 const stream=canvas.captureStream(30);

 recorder=new MediaRecorder(stream,{mimeType:"video/webm"});

 chunks=[];

 recorder.ondataavailable=e=>chunks.push(e.data);

 recorder.onstop=()=>{
  const blob=new Blob(chunks,{type:"video/webm"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="cerebro_interactivo.webm";
  a.click();
 };

 recorder.start();
 setTimeout(()=>recorder.stop(),10000);
};
</script>

</body>
</html>
